<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>What Song Am I? | Jaryd Balderas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="particles" id="particles"></div>

  <!-- STICKY NAV -->
  <nav class="site-nav" id="siteNav">
    <div class="nav-inner">
      <span class="nav-logo">JB</span>
      <div class="nav-links">
        <a href="index.html" class="nav-link">Home</a>
        <a href="quiz.html" class="nav-link quiz-link active">🎵 What Song Am I?</a>
      </div>
    </div>
  </nav>

  <!-- QUIZ HERO -->
  <div class="quiz-hero">
    <div class="quiz-hero-bg"></div>
    <p class="quiz-eyebrow">Personality Quiz</p>
    <h1 class="quiz-main-title">WHAT SONG<br><span>AM I?</span></h1>
    <p class="quiz-subtitle">8 questions. One perfect song. Discover which iconic track matches your personality.</p>
  </div>

  <!-- QUIZ BODY -->
  <div class="quiz-wrap">

    <div class="progress-wrap">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <p class="progress-label" id="progressLabel">Question 1 of 8</p>

    <div class="question-card" id="questionCard">
      <div class="question-number" id="questionNumber">Question 1</div>
      <div class="question-text" id="questionText"></div>
      <div class="answers-grid" id="answersGrid"></div>
    </div>

    <button class="next-btn" id="nextBtn" disabled>Next →</button>

    <div class="result-card" id="resultCard">
      <div class="result-emoji" id="resultEmoji"></div>
      <div class="result-label">Your Song Is...</div>
      <div class="result-song" id="resultSong"></div>
      <div class="result-artist" id="resultArtist"></div>
      <div class="result-description" id="resultDescription"></div>
      <button class="retake-btn" onclick="startQuiz()">🔁 Retake Quiz</button>
    </div>

  </div>

  <footer class="page-footer">
    <span>Copyright &copy; 2026 Jaryd Balderas. All Rights Reserved.</span>
  </footer>

  <script src="main.js"></script>
  <script>
    /* ============================================================
       QUIZ DATA
       Song keys: MJ, DRK, BLY, JLN, BCH, MRG, TYL, SWF
    ============================================================ */
    const questions = [
      {
        text: "It's Friday night — what are you most likely doing?",
        answers: [
          { text: "Dancing at a packed party",         scores: { MJ: 3, SWF: 2 } },
          { text: "Chilling and gaming / vibing solo",  scores: { DRK: 3, BLY: 2 } },
          { text: "Out on the town with your crew",     scores: { BCH: 2, MRG: 3 } },
          { text: "Grinding — working on your goals",   scores: { TYL: 3, JLN: 1 } },
        ]
      },
      {
        text: "What word best describes your vibe?",
        answers: [
          { text: "Unstoppable",    scores: { MJ: 3, TYL: 2 } },
          { text: "Mysterious",     scores: { BLY: 3, DRK: 2 } },
          { text: "Chill & real",   scores: { MRG: 3, DRK: 1 } },
          { text: "Free-spirited",  scores: { BCH: 3, SWF: 2 } },
        ]
      },
      {
        text: "Someone disrespects you. How do you handle it?",
        answers: [
          { text: "Ignore it — you're too focused on winning",   scores: { TYL: 3, DRK: 2 } },
          { text: "Clap back with style and confidence",         scores: { MJ: 3, SWF: 2 } },
          { text: "Take matters into your own hands 🔑",          scores: { JLN: 3, BCH: 1 } },
          { text: "Laugh it off — drama ain't your thing",       scores: { MRG: 3, BLY: 1 } },
        ]
      },
      {
        text: "Pick your ideal road trip soundtrack:",
        answers: [
          { text: "80s classic rock bangers",            scores: { BCH: 3, MJ: 2 } },
          { text: "Country hits with the windows down",  scores: { JLN: 3, MRG: 2 } },
          { text: "Drake, The Weeknd, late-night R&B",   scores: { DRK: 2, BLY: 3 } },
          { text: "High-energy rap & hip-hop",           scores: { TYL: 3, MRG: 1 } },
        ]
      },
      {
        text: "What's your relationship with success?",
        answers: [
          { text: "I hustle for it every single day",       scores: { TYL: 3, MJ: 1 } },
          { text: "It finds me — I just stay authentic",    scores: { MRG: 3, DRK: 2 } },
          { text: "I celebrate every win, big or small",    scores: { SWF: 3, BCH: 2 } },
          { text: "I refuse to let anyone dim my light",    scores: { BLY: 3, JLN: 2 } },
        ]
      },
      {
        text: "Your friends would describe you as:",
        answers: [
          { text: "The life of the party",          scores: { MJ: 3, SWF: 2 } },
          { text: "The deep, thoughtful one",        scores: { BLY: 3, BCH: 2 } },
          { text: "The loyal, real one",             scores: { DRK: 3, JLN: 2 } },
          { text: "The wild card — unpredictable!",  scores: { MRG: 3, TYL: 1 } },
        ]
      },
      {
        text: "Pick a late-night activity:",
        answers: [
          { text: "Studio session / making art",       scores: { MJ: 2, TYL: 3 } },
          { text: "Deep convos under the stars",       scores: { BLY: 3, DRK: 2 } },
          { text: "Bonfire with country music",        scores: { JLN: 3, MRG: 2 } },
          { text: "Karaoke — belting your heart out",  scores: { BCH: 3, SWF: 2 } },
        ]
      },
      {
        text: "What motivates you most in life?",
        answers: [
          { text: "Proving the doubters wrong",          scores: { TYL: 3, MJ: 2 } },
          { text: "Love, loyalty, and real connections", scores: { DRK: 3, JLN: 2 } },
          { text: "Freedom and living on your terms",    scores: { MRG: 3, BCH: 2 } },
          { text: "Joy — living your best life fully",   scores: { SWF: 3, BLY: 1 } },
        ]
      },
    ];

    const results = {
      MJ:  { emoji: "🕺", song: "BEAT IT",             artist: "Michael Jackson",  description: "You are pure energy and confidence. You walk into any room and own it without even trying. Like the King of Pop himself, you bring people together and turn any moment into a performance. You're a natural-born leader who refuses to back down from a challenge." },
      DRK: { emoji: "🦅", song: "GOD'S PLAN",          artist: "Drake",            description: "Loyalty is your currency. You're the person who shows up for the people you love without being asked, and you move through life with quiet confidence. You know your blessings and you don't take them for granted. Real ones gravitate toward you naturally." },
      BLY: { emoji: "🌙", song: "BLINDING LIGHTS",     artist: "The Weeknd",       description: "You're mysterious, magnetic, and deeply emotional beneath a cool exterior. You feel everything intensely but keep your cards close. You live for those late-night drives and meaningful conversations. People are drawn to your depth without always knowing why." },
      JLN: { emoji: "🤠", song: "BEFORE HE CHEATS",    artist: "Carrie Underwood", description: "You don't mess around. You've got a huge heart but cross you and you'll remind everyone exactly who they're dealing with. You're fiercely loyal, unapologetically authentic, and you know your worth — country roads or city streets, you carry yourself with conviction." },
      BCH: { emoji: "🎸", song: "BOHEMIAN RHAPSODY",   artist: "Queen",            description: "You are one of a kind — dramatic, creative, and impossible to put in a box. You've got layers: funny, deep, theatrical, genuine. You live life as if it were a performance, and honestly? We're all just lucky to be in the audience." },
      MRG: { emoji: "🏇", song: "OLD TOWN ROAD",       artist: "Lil Nas X",        description: "You blend worlds that nobody else thought to mix and make it look effortless. You're creative, genre-defying, and completely yourself no matter who's watching. You ride till you can't no more — and somehow that becomes the most iconic move in the room." },
      TYL: { emoji: "🔥", song: "LOSE YOURSELF",       artist: "Eminem",           description: "This is your moment and you know it. You've worked too hard and sacrificed too much to let it slip away. You're relentless, focused, and driven by a fire that most people can't even see. When the opportunity comes, you seize it with everything you've got." },
      SWF: { emoji: "✨", song: "SHAKE IT OFF",         artist: "Taylor Swift",     description: "Nothing gets you down for long. You've faced the haters, the drama, and the setbacks — and every time you come back dancing. You've got an infectious energy that lifts everyone around you, and you've learned that the best revenge is unbothered joy." },
    };

    let currentQ = 0, selectedAnswer = null, scores = {};

    function startQuiz() {
      currentQ = 0; selectedAnswer = null;
      scores = { MJ:0, DRK:0, BLY:0, JLN:0, BCH:0, MRG:0, TYL:0, SWF:0 };
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('questionCard').style.display = 'block';
      document.getElementById('nextBtn').style.display = 'block';
      renderQuestion();
    }

    function renderQuestion() {
      const q = questions[currentQ];
      selectedAnswer = null;
      document.getElementById('questionNumber').textContent = 'Question ' + (currentQ + 1);
      document.getElementById('questionText').textContent = q.text;
      document.getElementById('nextBtn').disabled = true;

      const pct = (currentQ / questions.length) * 100;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressLabel').textContent =
        'Question ' + (currentQ + 1) + ' of ' + questions.length;

      const grid = document.getElementById('answersGrid');
      grid.innerHTML = '';
      q.answers.forEach((ans, idx) => {
        const btn = document.createElement('button');
        btn.className = 'answer-btn';
        btn.textContent = ans.text;
        btn.onclick = () => selectAnswer(idx);
        grid.appendChild(btn);
      });

      const card = document.getElementById('questionCard');
      card.style.animation = 'none';
      card.offsetHeight;
      card.style.animation = 'fadeUp 0.4s ease both';
    }

    function selectAnswer(idx) {
      selectedAnswer = idx;
      document.querySelectorAll('.answer-btn').forEach((b, i) =>
        b.classList.toggle('selected', i === idx));
      document.getElementById('nextBtn').disabled = false;
    }

    function nextQuestion() {
      if (selectedAnswer === null) return;
      const s = questions[currentQ].answers[selectedAnswer].scores;
      for (const [k, v] of Object.entries(s)) scores[k] += v;
      currentQ++;
      if (currentQ >= questions.length) showResult();
      else renderQuestion();
    }

    function showResult() {
      const topKey = Object.keys(scores).reduce((a, b) => scores[a] >= scores[b] ? a : b);
      const r = results[topKey];
      document.getElementById('questionCard').style.display = 'none';
      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressLabel').textContent = 'Complete!';
      document.getElementById('resultEmoji').textContent = r.emoji;
      document.getElementById('resultSong').textContent = r.song;
      document.getElementById('resultArtist').textContent = '— ' + r.artist;
      document.getElementById('resultDescription').textContent = r.description;
      document.getElementById('resultCard').style.display = 'block';
      document.getElementById('resultCard').scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    document.getElementById('nextBtn').onclick = nextQuestion;
    startQuiz();
  </script>
</body>
</html>
